name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx run i18n-keygen:lint
      - run: pnpm exec nx run i18n-keygen:typecheck
      - run: pnpm exec nx run i18n-keygen:build
      - run: pnpm exec nx run i18n-keygen:test
      - run: pnpm exec nx run-many -t i18n
      - run: pnpm exec nx run i18n-keygen-e2e:e2e
