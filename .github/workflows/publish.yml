name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run i18n-keygen:build

      - name: Prepare dist for publishing
        uses: gagle/prepare-dist-action@main
        with:
          path: packages/i18n-keygen
          tag: ${{ github.ref_name }}

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance
        working-directory: packages/i18n-keygen/dist
