name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/i18n-keygen--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/i18n-keygen--tag_name'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec nx run i18n-keygen:build

      - name: Prepare dist for publishing
        uses: gagle/prepare-dist@v1
        with:
          path: packages/i18n-keygen
          tag: ${{ needs.release-please.outputs.tag_name }}

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance
        working-directory: packages/i18n-keygen/dist
